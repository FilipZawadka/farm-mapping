# Extended world coverage: all_clusters_v2 = original 53 ADM0s (101,795 rows)
# + 56 newly merged country parquets (34,124 rows) = 135,919 rows / 109 ADM0s.
# Inference runs on every cluster, including unlabeled (UP/UN map layers).
run_name: "world_v2"

data:
  candidates_dir: data/rachel_geometry_candidates/candidates_world_v2
  parquet_source: data/rachel_geometry_candidates/all_countries/all_clusters_v2.parquet
  inspected_only: false
  include_unlabeled: true

patches:
  patch_size_px: 128
  resolution_m: 10
  bands: [B2, B3, B4, B8, B11, B12]
  indices: [NDVI, NDBI, NDWI]
  composite: median
  date_range: ["2023-01-01", "2023-12-31"]
  max_cloud_cover: 15
  output_dir: data/patches
  num_workers: 16

model:
  architecture: resnet50
  hub_name: microsoft/resnet-50
  pretrained: true
  num_classes: 2
  input_channels: 4
  freeze_backbone_epochs: 5

training:
  epochs: 1
  batch_size: 64
  channel_subset: [B2, B3, B4, NDWI]
  crop_center_px: 64

inference:
  checkpoint: data/output/rachel_baseline/best_model.pt
  threshold: 0.7
  confidence_tiers:
    high: 0.9
    medium: 0.7
    low: 0.4

visualization:
  output_dir: output/maps_world_v2
  show_true_positives: true
  show_false_positives: true
  show_false_negatives: true
  show_true_negatives: true
