# Minimal config for smoke-testing the pipeline end-to-end on CPU.
# Extracts ~50 patches, trains for 2 epochs, and generates a prediction map.

data:
  countries: [thailand]
  species_filter: [Chickens, Pigs, Turkeys, Ducks]
  categories_include: [Farm]
  train_regions: null
  val_regions: null
  test_regions: null
  candidates_dir: data/candidates
  osm_farm_cache_dir: data/cache/osm_farm_finder
  negative_sampling:
    strategy: random_rural
    ratio: 1.0
    min_distance_m: 2000
    seed: 42
    osm_cache_dir: data/cache/osm_negatives

patches:
  patch_size_px: 32
  resolution_m: 10
  bands: [B2, B3, B4, B8, B11, B12]
  indices: [NDVI, NDBI, NDWI]
  composite: median
  date_range: ["2023-06-01", "2023-09-01"]
  max_cloud_cover: 20
  output_dir: data/patches/smoke
  num_workers: 2

model:
  architecture: resnet50
  hub_name: microsoft/resnet-50
  pretrained: true
  num_classes: 2
  input_channels: 9
  freeze_backbone_epochs: 0

training:
  epochs: 2
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.01
  scheduler: cosine
  early_stopping_patience: 5
  val_split: 0.2
  test_split: 0.2
  seed: 42
  mixed_precision: false

mlflow:
  tracking_uri: ./mlruns
  experiment_name: smoke_test
  log_model: false

runpod:
  gpu_type: "NVIDIA A40"
  docker_image: farm-mapping-train:latest
  volume_mount: /workspace/data
  api_key_env: RUNPOD_API_KEY

inference:
  checkpoint: output/best_model.pt
  threshold: 0.5
  confidence_tiers:
    high: 0.8
    medium: 0.5
    low: 0.3

visualization:
  output_dir: output/maps_smoke
  show_true_positives: true
  show_false_positives: true
  show_false_negatives: true
  show_true_negatives: false
