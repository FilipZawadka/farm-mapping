# Inference on ALL 101,795 clusters from all_clusters.parquet (labeled + unlabeled)
# using baseline_v2 checkpoint. Most labeled patches already extracted from previous run.
run_name: "baseline_v2_all_clusters"

data:
  candidates_dir: data/rachel_geometry_candidates/candidates_all_clusters
  parquet_source: data/rachel_geometry_candidates/all_countries/all_clusters.parquet
  inspected_only: false
  include_unlabeled: true

patches:
  patch_size_px: 128
  resolution_m: 10
  bands: [B2, B3, B4, B8, B11, B12]
  indices: [NDVI, NDBI, NDWI]
  composite: median
  date_range: ["2023-01-01", "2023-12-31"]
  max_cloud_cover: 15
  output_dir: data/patches
  num_workers: 16

model:
  architecture: resnet50
  hub_name: microsoft/resnet-50
  pretrained: true
  num_classes: 2
  input_channels: 4
  freeze_backbone_epochs: 5

training:
  epochs: 1
  batch_size: 64
  channel_subset: [B2, B3, B4, NDWI]
  crop_center_px: 64

inference:
  checkpoint: data/output/rachel_baseline/best_model.pt
  threshold: 0.7
  confidence_tiers:
    high: 0.9
    medium: 0.7
    low: 0.4

visualization:
  output_dir: output/maps_baseline_v2_all_clusters
  show_true_positives: true
  show_false_positives: true
  show_false_negatives: true
  show_true_negatives: true
